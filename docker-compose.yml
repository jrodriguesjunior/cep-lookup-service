version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cep-postgres
    environment:
      POSTGRES_DB: cep_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  wiremock:
    image: wiremock/wiremock:3.3.1
    container_name: cep-wiremock
    ports:
      - "8081:8080"
    volumes:
      - ./wiremock:/home/wiremock
